<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blook Arena</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="game-mode-classic">

    <div id="auth-screen" class="container">
        <h1>BLOOK REMAKE</h1>
        <div style="background: var(--panel-bg); padding: 40px; border-radius: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.3)">
            <input type="text" id="auth-username" placeholder="Username" style="width:90%; padding:15px; margin-bottom:15px; border-radius:8px; border:none; font-size:1.1rem;"><br>
            <input type="password" id="auth-password" placeholder="Password" style="width:90%; padding:15px; margin-bottom:20px; border-radius:8px; border:none; font-size:1.1rem;"><br>
            <button class="blook-btn blook-btn-blue" onclick="handleAuth('login')">Login</button>
            <button class="blook-btn blook-btn-purple" onclick="handleAuth('signup')">Sign Up</button>
        </div>
    </div>

    <div id="hub-screen" class="container" style="display: none;">
        <h1 id="welcome-text">PLAY BLOOK</h1>
        
        <div style="display:flex; gap: 30px; width:100%; justify-content:center; margin-top:40px;">
            <div style="background: var(--panel-bg); padding: 30px; border-radius: 20px; width: 40%;">
                <h3>JOIN A GAME</h3>
                <input type="text" id="join-pin" placeholder="Enter Game PIN" style="width:80%; padding:12px; margin-bottom:15px; border-radius:8px; border:none; font-size:1.2rem; text-align:center;"><br>
                <button class="blook-btn blook-btn-green" onclick="joinGameRoom()">ENTER ARENA</button>
            </div>

            <div style="background: var(--panel-bg); padding: 30px; border-radius: 20px; width: 40%;">
                <h3>HOST A NEW ROOM</h3>
                <select id="mode-select" style="width:85%; padding:12px; margin-bottom:15px; border-radius:8px; font-size:1.1rem;">
                    <option value="classic">Classic Mode</option>
                    <option value="gold">Gold Quest</option>
                    <option value="brawl">Battle Brawl</option>
                </select><br>
                <button class="blook-btn blook-btn-orange" onclick="hostGameRoom()">CREATE ROOM</button>
            </div>
        </div>

        <div id="hridaand-admin-panel" class="container" style="display:none; margin-top: 50px;">
            <div class="admin-wrapper">
                <h2 style="color: var(--accent-warning); margin-top:0;">🛑 EMERGENCY OVERRIDE PLATFORM</h2>
                <p>System Token Status: <span style="color: var(--accent-success); font-weight:900;">AUTHORIZED AS HRIDAAND</span></p>
                <h3>All Live Global Game Sessions:</h3>
                <div id="admin-telemetry-hook">
                    </div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="container" style="display: none;">
        <h1 id="display-room-title">Lobby</h1>
        <h2 id="display-room-pin" style="font-size: 3rem; color: var(--accent-warning);">PIN: ------</h2>
        <div id="lobby-players-box" style="background: rgba(0,0,0,0.2); padding: 20px; width:80%; min-height: 200px; border-radius: 16px; margin: 20px 0;"></div>
        <button id="start-game-btn" class="blook-btn blook-btn-green" style="display:none;" onclick="triggerStart()">START GAME</button>
        
        <div id="active-playboard" style="display:none; width: 100%;">
            <h2 id="current-question-text" style="font-size: 2.2rem; margin-bottom:40px;">Waiting for question...</h2>
            <div class="answer-grid">
                <div class="answer-card" onclick="submitChoice(0)" id="ans-0">Choice 1</div>
                <div class="answer-card" onclick="submitChoice(1)" id="ans-1">Choice 2</div>
                <div class="answer-card" onclick="submitChoice(2)" id="ans-2">Choice 3</div>
                <div class="answer-card" onclick="submitChoice(3)" id="ans-3">Choice 4</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let globalUsername = null;
        let isHostUser = false;

        function handleAuth(type) {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;

            fetch(`/api/${type}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) return alert(data.error);
                
                globalUsername = data.username;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('hub-screen').style.display = 'flex';
                document.getElementById('welcome-text').innerText = `WELCOME, ${globalUsername.toUpperCase()}`;

                // Validate admin flag for HridaanD
                if (globalUsername === 'HridaanD') {
                    document.getElementById('hridaand-admin-panel').style.display = 'block';
                    socket.emit('registerAdminFeed', { username: 'HridaanD' });
                }
            });
        }

        function hostGameRoom() {
            const mode = document.getElementById('mode-select').value;
            isHostUser = true;
            socket.emit('hostCreateRoom', { hostName: globalUsername, gameMode: mode });
        }

        function joinGameRoom() {
            const pin = document.getElementById('join-pin').value;
            if(!pin) return alert('Enter a PIN');
            socket.emit('playerJoinRoom', { pin, playerName: globalUsername });
        }

        function triggerStart() {
            socket.emit('startGame');
        }

        function submitChoice(index) {
            socket.emit('submitAnswer', { answerIndex: index });
        }

        // Socket Receivers
        socket.on('roomCreated', (room) => {
            document.getElementById('hub-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('display-room-title').innerText = `MODE: ${room.gameMode.toUpperCase()}`;
            document.getElementById('display-room-pin').innerText = `PIN: ${room.pin}`;
            if (isHostUser) document.getElementById('start-game-btn').style.display = 'inline-block';
        });

        socket.on('playerListUpdate', (players) => {
            document.getElementById('hub-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            const lobby = document.getElementById('lobby-players-box');
            lobby.innerHTML = players.map(p => `<span style="padding:10px 20px; background:var(--panel-bg); margin:5px; border-radius:10px; display:inline-block; font-weight:bold;">✨ ${p.name}</span>`).join('');
        });

        socket.on('nextQuestion', (qData) => {
            document.getElementById('lobby-players-box').style.display = 'none';
            document.getElementById('start-game-btn').style.display = 'none';
            document.getElementById('active-playboard').style.display = 'block';
            
            document.getElementById('current-question-text').innerText = qData.question;
            for(let i=0; i<4; i++) {
                document.getElementById(`ans-${i}`).innerText = qData.answers[i] || '';
            }
        });

        socket.on('answerResult', (data) => {
            alert(data.correct ? `Correct! +100 Pts. Current Gold: ${data.currentGold}` : "Incorrect answer!");
        });

        // HridaanD Admin Socket Stream Listener
        socket.on('adminTelemetryUpdate', (globalRooms) => {
            if (globalUsername !== 'HridaanD') return;
            const outputHook = document.getElementById('admin-telemetry-hook');
            outputHook.innerHTML = '';

            const keys = Object.keys(globalRooms);
            if(keys.length === 0) {
                outputHook.innerHTML = '<p style="color:gray; font-style:italic;">No games are currently active on the cluster.</p>';
                return;
            }

            keys.forEach(pin => {
                const data = globalRooms[pin];
                const badge = document.createElement('div');
                badge.className = 'live-game-badge';
                badge.innerHTML = `
                    <div>
                        <strong style="color:var(--accent-warning)">[PIN: ${data.pin}]</strong> - Host: <b>${data.hostName}</b> | Mode: <i>${data.gameMode}</i>
                    </div>
                    <div>
                        State: <span style="color:var(--accent-success)">${data.state}</span> | Active Clients: <b>${data.activeCount}</b>
                    </div>
                `;
                outputHook.appendChild(badge);
            });
        });

        socket.on('joinError', (err) => alert(err));
        socket.on('gameTerminated', (msg) => { alert(msg); location.reload(); });
    </script>
</body>
</html>
