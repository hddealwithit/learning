<div id="view-game" class="game-layout" style="display: none;">
    
    <header class="game-top-bar">
        <div class="stats-container">
            <div class="stat-pill pill-score">Score: <span id="stat-score">100</span></div>
            <div class="stat-pill pill-gold">Gold: <span id="stat-gold">100</span></div>
            <div class="stat-pill pill-crypto">Crypto: <span id="stat-crypto">0</span></div>
        </div>
        
        <h3 class="blook-font" id="game-pin-header" style="margin: 0; font-size: 1.5rem; color: rgba(255,255,255,0.6);">PIN: ------</h3>
        
        <div class="blook-timer" id="live-timer-bubble">9</div>
    </header>

    <div id="box-lobby-players" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-content: center; height: 60vh;">
        </div>
    
    <div style="text-align: center;">
        <button id="btn-master-start" class="btn-blook btn-green" style="display: none;" onclick="triggerHostGameBegin()">START BATTLEGROUND</button>
    </div>

    <main id="board-live-interactive" style="display: none; width: 100%;">
        <div class="question-container">
            <h2 id="label-active-question" class="massive-question-text">Which planet is closest to the Sun?</h2>
        </div>
        
        <div class="quad-answer-grid">
            <div class="huge-answer-btn" onclick="commitPlayerAnswerChoice(0)" id="choice-0">Mercury</div>
            <div class="huge-answer-btn" onclick="commitPlayerAnswerChoice(1)" id="choice-1">Venus</div>
            <div class="huge-answer-btn" onclick="commitPlayerAnswerChoice(2)" id="choice-2">Earth</div>
            <div class="huge-answer-btn" onclick="commitPlayerAnswerChoice(3)" id="choice-3">Mars</div>
        </div>
    </main>
</div>
